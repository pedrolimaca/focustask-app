version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: focustask_mysql
    restart: always
    environment:
      MYSQL_DATABASE: 'focustask_db'
      MYSQL_ROOT_PASSWORD: '' 
    ports:
      - '3306:3306'
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: focustask_backend
    restart: always
    ports:
      - '5000:5000'
    environment:
      DB_HOST: db           
      DB_USER: root
      DB_PASSWORD: 
      DB_NAME: focustask_db
    depends_on:
      db:
        condition: service_healthy 

  frontend:
    build: ./frontend
    container_name: focustask_frontend
    restart: always
    ports:
      - '3000:3000'
    stdin_open: true 
    tty: true
    depends_on:
      - backend

volumes:
  db_data: